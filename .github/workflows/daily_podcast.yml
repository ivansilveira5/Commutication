name: Daily Podcast Generator

on:
  schedule:
    - cron: '30 9 * * *' # Run at 9:30 AM UTC daily (6:30 AM GMT-3)
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install System Dependencies (FFmpeg for Audio Compression)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./Backend
        run: pip install -r requirements.txt

      - name: Run Backend Script
        working-directory: ./Backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python main.py

      - name: Commit and Push Changes
        working-directory: ./Backend
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the generated WAV file, metadata JSON, and any deleted old WAV files
          git add -A
          
          # Commit only if there are changes
          git diff --staged --quiet || (git commit -m "Auto-generate daily podcast files" && git pull --rebase origin main && git push)
